<style>

*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:'Noto Sans SC',system-ui,sans-serif;color:#2a2c33}
#map{position:absolute;inset:0;background:#eef0ec}
#ov{position:absolute;inset:0;z-index:450;pointer-events:none}
.card{position:absolute;z-index:600;background:#fff;border:1px solid #e7e7ec;border-radius:14px;box-shadow:0 8px 26px rgba(40,40,60,.12)}
#hud{top:16px;left:16px;padding:13px 17px;min-width:212px}
#hud h1{font-size:15px;font-weight:500;letter-spacing:.5px;color:#3b5bdb}
#clock{font-family:'IBM Plex Mono';font-size:27px;font-weight:600;margin:1px 0 7px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:3px 14px;font-family:'IBM Plex Mono';font-size:12px;color:#7b7f8a}
.stats b{font-weight:600;color:#2a2c33}
.s1 b{color:#3b5bdb}.s2 b{color:#e0524a}.s3 b{color:#2f9e6f}
#hint{top:16px;right:16px;padding:10px 14px;font-size:11px;color:#9a9ea8;line-height:1.9;text-align:right}
#hint b{color:#5b5f6a}
#lines{top:118px;right:16px;padding:10px 11px;width:214px;max-height:46vh;overflow:auto}
#lines .h{font-size:11px;color:#9a9ea8;letter-spacing:1px;margin-bottom:7px}
.lrow{display:block;padding:7px 8px;border-radius:9px;cursor:pointer;margin-bottom:5px;border:1px solid transparent}
.lrow:hover{background:#f4f5f8}.lrow.sel{background:#eef2ff;border-color:#cdd8fb}.lrow.sel:hover{background:#eef2ff}
.lrow .r1{display:flex;align-items:center;gap:6px}
.lrow .r2{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.lrow .ci{width:18px;height:18px;padding:0;border:none;background:none;cursor:pointer;flex:0 0 auto}
.lrow .ni{flex:1;min-width:0;border:1px solid transparent;background:transparent;font-family:inherit;font-size:12.5px;color:#2a2c33;border-radius:5px;padding:2px 4px}
.lrow .ni:hover{border-color:#e2e3e9}.lrow .ni:focus{outline:none;border-color:#3b5bdb;background:#fff}
.lrow .r2 small{color:#9a9ea8;font-family:'IBM Plex Mono';font-size:11px}
.lrow .b{border:1px solid #e2e3e9;background:#fff;border-radius:7px;font-size:11px;padding:3px 8px;cursor:pointer;color:#41444d;margin-left:5px}
.lrow .b:hover{background:#eef2ff}
#lines .empty{font-size:11px;color:#b8bcc6;padding:4px 2px}
#ctrl{bottom:16px;left:16px;padding:13px;display:flex;flex-direction:column;gap:9px;width:248px}
.row{display:flex;gap:8px}
button.mn{flex:1;font-family:'Noto Sans SC';font-size:13px;color:#41444d;background:#f4f5f8;border:1px solid #e2e3e9;border-radius:10px;padding:8px 4px;cursor:pointer;transition:.13s}
button.mn:hover{background:#ebedf2}
button.mn.on{background:#3b5bdb;border-color:#3b5bdb;color:#fff;box-shadow:0 3px 9px rgba(59,91,219,.28)}
button.mn.sm{flex:0 0 auto;padding:8px 11px}
.slider{display:flex;align-items:center;gap:9px;font-family:'IBM Plex Mono';font-size:11px;color:#7b7f8a}
.slider input{flex:1;accent-color:#3b5bdb}
.slider .v{min-width:48px;text-align:right;color:#3b5bdb;font-weight:600}
#tip{font-size:11px;color:#9a9ea8;border-top:1px dashed #e2e3e9;padding-top:8px;line-height:1.5}
#tip b{color:#3b5bdb}
#toast{position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:700;opacity:0;transition:.3s;background:#fdecea;border:1px solid #f3b3aa;color:#c0392b;border-radius:12px;padding:8px 17px;font-size:13.5px;font-weight:500;pointer-events:none;box-shadow:0 6px 18px rgba(192,57,43,.16)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.good{background:#e9f7ef;border-color:#a7e0c0;color:#1e8a55}
#pback{position:absolute;inset:0;z-index:750;background:rgba(30,30,40,.28);display:none}
#panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:800;width:320px;padding:20px;display:none}
#panel .pt{font-size:14px;color:#3b5bdb;font-weight:500;letter-spacing:.5px}
#panel .grade{display:flex;align-items:center;gap:14px;margin:12px 0 4px}
#panel .gl{font-family:'IBM Plex Mono';font-weight:600;font-size:42px;color:#3b5bdb;line-height:1}
#panel .gs{font-family:'IBM Plex Mono';font-weight:600;font-size:30px;color:#2a2c33}
#panel .gs small{font-size:14px;color:#9a9ea8;font-weight:500}
#panel .pq{font-size:12.5px;color:#7b7f8a;margin-bottom:13px}
#panel .pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px 10px;font-size:11.5px;color:#7b7f8a}
#panel .pg b{display:block;font-family:'IBM Plex Mono';font-size:18px;color:#2a2c33;font-weight:600;margin-top:1px}
#panel .pg b.g{color:#1e8a55}#panel .pg b.r{color:#e0524a}
#panel .pc{margin:14px 0 2px;font-family:'IBM Plex Mono';font-size:11px;color:#9a9ea8;text-align:center}
#panel .pb{display:flex;gap:8px;margin-top:15px}

(function genSynthetic(){
  const curve=new Array(72).fill(0);let csum=0;
  for(const s of STATIONS){const lam=LAMBDA[s.n];if(lam)for(let w=0;w<72;w++)curve[w]+=lam[w];}
  for(const v of curve)csum+=v;for(let w=0;w<72;w++)curve[w]/=(csum||1);
  let mLa=90,MLa=-90,mLn=180,MLn=-180;
  for(const s of STATIONS){mLa=Math.min(mLa,s.lat);MLa=Math.max(MLa,s.lat);mLn=Math.min(mLn,s.lng);MLn=Math.max(MLn,s.lng);}
  mLa-=0.12;MLa+=0.12;mLn-=0.15;MLn+=0.15;
  const cLa=39.915,cLn=116.40,cl=Math.cos(cLa*Math.PI/180);
  const real=STATIONS.slice();const synth=[];let id=0;const step=0.025;
  function near(la,ln,d){for(const s of real){const dy=(la-s.lat)*111.32,dx=(ln-s.lng)*111.32*cl;if(dx*dx+dy*dy<d*d)return true;}return false;}
  for(let la=mLa;la<=MLa;la+=step)for(let ln=mLn;ln<=MLn;ln+=step){
    const jla=la+(Math.random()-0.5)*step*0.7,jln=ln+(Math.random()-0.5)*step*0.7;
    if(near(jla,jln,1.8))continue;
    const dkm=Math.hypot((jla-cLa)*111.32,(jln-cLn)*111.32*cl);
    const mag=Math.round((1000+2600*Math.exp(-dkm/20))*(0.4+Math.random()*1.3));
    if(mag<150)continue;
    const nm='syn#'+(id++);
    STATIONS.push({n:nm,d:'(模拟客流)',lat:+jla.toFixed(5),lng:+jln.toFixed(5),L:[],tr:false,g:mag,syn:true});
    LAMBDA[nm]=curve.map(c=>Math.max(0,Math.round(mag*c)));synth.push(STATIONS[STATIONS.length-1]);
  }
  for(const s of synth){const sc=[];
    for(const t of real){const dy=(s.lat-t.lat)*111.32,dx=(s.lng-t.lng)*111.32*cl;const d2=dx*dx+dy*dy;if(d2<0.04)continue;sc.push([t.n,t.g/(d2+1)]);}
    sc.sort((a,b)=>b[1]-a[1]);DEST[s.n]=sc.slice(0,12).map(e=>[e[0],Math.max(1,Math.round(e[1]))]);}
})();

function recomputeRoutes(){
  const n=PS.length;trCount=new Array(n).fill(0);
  const inLine=Array.from({length:n},()=>new Set());
  lines.forEach((L,li)=>{L._id=li;L._set=new Set(L.nodes);L.nodes.forEach(a=>inLine[a].add(L));});
  for(let i=0;i<n;i++)trCount[i]=inLine[i].size;
  const states=[],statesAt=Array.from({length:n},()=>[]),stIdx={};
  lines.forEach(L=>{for(const s of new Set(L.nodes)){const key=s+'#'+L._id;if(stIdx[key]===undefined){stIdx[key]=states.length;statesAt[s].push(states.length);states.push({s,L});}}});
  const S=states.length,adj=Array.from({length:S},()=>[]);
  lines.forEach(L=>{const seq=L.nodes,m=seq.length,pr=[];for(let k=0;k+1<m;k++)pr.push([seq[k],seq[k+1]]);if(L.loop&&m>2)pr.push([seq[m-1],seq[0]]);
    for(const e of pr){if(e[0]===e[1])continue;const ia=stIdx[e[0]+'#'+L._id],ib=stIdx[e[1]+'#'+L._id];if(ia===undefined||ib===undefined)continue;adj[ia].push([ib,1]);adj[ib].push([ia,1]);}});
  for(let s=0;s<n;s++){const a=statesAt[s];for(let x=0;x<a.length;x++)for(let y=x+1;y<a.length;y++){adj[a[x]].push([a[y],TPEN]);adj[a[y]].push([a[x],TPEN]);}}
  reachA=Array.from({length:n},()=>new Array(n).fill(false));
  optLine=Array.from({length:n},()=>new Array(n).fill(null));
  for(let v=0;v<n;v++){if(!statesAt[v].length)continue;
    const dist=new Array(S).fill(Infinity),done=new Array(S).fill(false);
    for(const si of statesAt[v])dist[si]=0;
    for(;;){let u=-1,bd=Infinity;for(let i=0;i<S;i++)if(!done[i]&&dist[i]<bd){bd=dist[i];u=i;}if(u<0)break;done[u]=true;
      for(const e of adj[u])if(dist[u]+e[1]<dist[e[0]])dist[e[0]]=dist[u]+e[1];}
    for(let s=0;s<n;s++){if(s===v){reachA[v][v]=true;continue;}let best=Infinity,bl=null;
      for(const si of statesAt[s])if(dist[si]<best){best=dist[si];bl=states[si].L;}

}
function alive(i){return trCount[i]>0;}
function recomputeCatch(){
  ownerOf=new Int16Array(STATIONS.length).fill(-1);const n=PS.length;

    for(let i=0;i<n;i++){if(!alive(i))continue;const d=distM(s.lat,s.lng,PS[i].lat,PS[i].lng);if(d<=R&&d<bd){bd=d;bi=i;}}ownerOf[k]=bi;}
  for(let i=0;i<n;i++){PS[i].owned=[];PS[i].lam=new Array(72).fill(0);}
  for(let k=0;k<STATIONS.length;k++){const o=ownerOf[k];if(o<0)continue;PS[o].owned.push(k);
    const lam=LAMBDA[STATIONS[k].n];if(lam)for(let w=0;w<72;w++)PS[o].lam[w]+=lam[w];}
  for(const k in latent){if(ownerOf[k]>=0)delete latent[k];}
}

      '<div class="r2"><small>'+L.nodes.length+'站 · '+L.trains.length+'车'+(L.loop?' · 环':'')+'</small>'+
      '<span><button class="b" data-a="d">−车</button><button class="b" data-a="t">+车</button></span></div>';
    row.onclick=e=>{const a=e.target.getAttribute&&e.target.getAttribute('data-a');
      if(a==='t'){addTrainTo(li);e.stopPropagation();return;}
      if(a==='d'){removeTrainFrom(li);e.stopPropagation();return;}
      if(a==='x'){deleteLine(li);e.stopPropagation();return;}
      active=li;buildLineList();};
    const ci=row.querySelector('.ci');ci.onclick=e=>e.stopPropagation();ci.oninput=e=>{L.col=e.target.value;};
    const ni=row.querySelector('.ni');ni.onclick=e=>{e.stopPropagation();active=li;};ni.oninput=e=>{L.name=e.target.value;};
    box.appendChild(row);
  });
}
function addTrainTo(li){const L=lines[li];if(L&&L.nodes.length>1){L.trains.push({i:0,dir:L.trains.length%2?-1:1,t:0,dw:L.trains.length*.4,load:[]});buildLineList();}}
function removeTrainFrom(li){const L=lines[li];if(L&&L.trains.length){L.trains.pop();buildLineList();}}
function deleteLine(li){lines.splice(li,1);
  if(active>=lines.length)active=lines.length-1;recomputeNet();}

// ---------- 建造 ----------
function addAt(lat,lng,exIdx){
  const A=lines[active];
  if(active>=0&&A&&A.nodes.length>=3&&exIdx>=0){const opp=endMode==='tail'?A.nodes[0]:A.nodes[A.nodes.length-1];
    if(exIdx===opp){A.loop=true;recomputeNet();return;}}
  if(active>=0&&A&&A.loop)A.loop=false;
  let node;if(exIdx>=0)node=exIdx;else{PS.push({lat,lng});node=PS.length-1;}
  if(active<0||!lines[active]){lines.push({col:LCOLS[lines.length%LCOLS.length],nodes:[],trains:[],loop:false,name:'线路'+(lines.length+1)});active=lines.length-1;}
  const L=lines[active];
  if(endMode==='tail'){if(L.nodes[L.nodes.length-1]===node)return;L.nodes.push(node);}
  else{if(L.nodes[0]===node)return;L.nodes.unshift(node);}
  if(L.nodes.length===2&&!L.trains.length)L.trains.push({i:0,dir:1,t:0,dw:0,load:[]});
  L.trains.forEach(tr=>{tr.i=Math.min(tr.i,L.nodes.length-1);});
  recomputeNet();
}
function undoLine(li){const L=lines[li];if(!L)return;
  if(L.loop){L.loop=false;recomputeNet();return;}
  if(!L.nodes.length)return;if(endMode==='tail')L.nodes.pop();else L.nodes.shift();
  L.trains.forEach(tr=>{tr.i=Math.min(tr.i,Math.max(0,L.nodes.length-1));tr.t=0;});
  if(L.nodes.length<2)L.trains=[];
  if(L.nodes.length===0){lines.splice(li,1);if(active>=lines.length)active=lines.length-1;}
  recomputeNet();
}
map.on('click',e=>{if(!buildOn)return;const cp=e.containerPoint;let bi=-1,bd=16*16;
  for(let i=0;i<PS.length;i++){if(!alive(i))continue;const p=P(PS[i].lat,PS[i].lng);const d=(p.x-cp.x)**2+(p.y-cp.y)**2;if(d<bd){bd=d;bi=i;}}
  addAt(e.latlng.lat,e.latlng.lng,bi);});
map.on('mousemove',e=>{const cp=e.containerPoint;let bi=-1,bd=11*11;
  for(let i=0;i<STATIONS.length;i++){if(STATIONS[i].syn)continue;const p=P(STATIONS[i].lat,STATIONS[i].lng);if(p.x<-20||p.x>W+20||p.y<-20||p.y>H+20)continue;
    const d=(p.x-cp.x)**2+(p.y-cp.y)**2;if(d<bd){bd=d;bi=i;}}hoverAnchor=bi;});

// ---------- 仿真 ----------
let curWin=24;
function bornAt(k){const o=ownerOf[k];
  if(o<0){latent[k]=Math.min(LATENT_CAP,(latent[k]||0)+1);return;}
  const dd=DEST[STATIONS[k].n];if(!dd||!dd.length)return;let dt=0;for(const e of dd)dt+=e[1];
  let r2=Math.random()*dt,pick=dd[0][0];for(const e of dd){r2-=e[1];if(r2<=0){pick=e[0];break;}}
  const di=NAME2IDX[pick];if(di===undefined){lost++;dLost++;dUncovered++;return;}const P2=ownerOf[di];
  if(P2<0){lost++;dLost++;dUncovered++;if(Math.random()<0.0025)review('miss');return;}if(P2===o)return;
  if(reachA[o][P2])(Q[o]=Q[o]||[]).push({d:P2,t0:simAbs,o:o,trav:0,tr:0});else{lost++;dLost++;gaveUp++;dGaveUp++;}}
function arrive(L,tr){const st=L.nodes[tr.i];
  const keep=[];for(const p of tr.load){if(p.d===st){served++;dServed++;dWaitSum+=(p.tb!=null?p.tb-p.t0:0);dWaitN++;
      const dir=(p.o!=null&&PS[p.o])?distM(PS[p.o].lat,PS[p.o].lng,PS[st].lat,PS[st].lng):0;
      if((p.trav||0)>dir*1.8+1500&&Math.random()<0.03)review('detour');
      else if((p.tr||0)>=2&&Math.random()<0.035)review('transfer');
      else if((simAbs-(p.t0||simAbs))<7&&Math.random()<0.04)review('good');
      continue;}
    const ol=optLine[st]?optLine[st][p.d]:null;
    if(ol===null){(Q[st]=Q[st]||[]).push(p);continue;}
    if(ol!==L){p.tr=(p.tr||0)+1;(Q[st]=Q[st]||[]).push(p);}else keep.push(p);}
  tr.load=keep;
  const q=Q[st];if(q&&q.length){const kp=[];for(const p of q){
    if(tr.load.length<CAP){const ol=optLine[st]?optLine[st][p.d]:null;if(ol===L){p.tb=simAbs;tr.load.push(p);continue;}}kp.push(p);}Q[st]=kp;}}
function moveTrain(L,tr,sdt){if(tr.dw>0){tr.dw-=sdt;return;}const m=L.nodes.length;if(m<2)return;
  const loop=L.loop&&m>2;let nj;
  if(loop)nj=(tr.i+1)%m;else{nj=tr.i+tr.dir;if(nj<0||nj>=m){tr.dir=-tr.dir;nj=tr.i+tr.dir;}if(nj<0||nj>=m)return;}
  const A=PS[L.nodes[tr.i]],B=PS[L.nodes[nj]],seg=distM(A.lat,A.lng,B.lat,B.lng)||1;
  tr.t+=TRAIN_MPS*sdt/seg;
  if(tr.t>=1){for(const p of tr.load)p.trav=(p.trav||0)+seg;if(seg>3500&&tr.load.length>0&&Math.random()<0.025)review('far');tr.i=nj;tr.t=0;arrive(L,tr);tr.dw=DWELL;if(!loop&&(tr.i===0||tr.i===m-1))tr.dir=-tr.dir;}}
const FB={
 crowd:['人比地铁零件还密!','下车?那是下辈子的事!','站台像春运,车厢像罐头厂!','我被挤到学会悬浮术!','工作人员举的牌子上写:“别挤,我也是人”!'],
 wait:['等车等到我以为地铁停运了!','隔壁蜗牛都超我三趟了!','发车间隔:从冬天等到春天!','建议站台改名“候车养老中心”!','下一班?我孩子都能打酱油了!'],
 far:['俩站隔了大半个北京,差评!','这区间长到我睡了一觉还没到!','下一站怎么在地平线那头?','坐一站够看完一部电影!'],
 detour:['直线五分钟,绕路半小时!','这路线是贪吃蛇本人设计的吧?','两点之间,曲线最长!','坐完这趟,我怀疑地球是方的!','司机是不是在刷步数?'],
 miss:['市中心不设站,你是故意的吧?','完美避开所有该停的地方!','站名叫“广场”,下车是玉米地!','漏的站比停的站还多,优秀!','这线路是“跳过”键本键!'],
 transfer:['换乘通道长到能开家长会!','换乘两次,不如走路直达!','这换乘设计是迷宫策划的!','换个乘,从A口走到Z口!','换乘站该叫“铁人三项起点”!'],
 good:['丝滑!这线修得有点东西,好评!','说走就走,一秒上车,好评!','通勤体验拉满,给规划师加鸡腿!','终于不用挤,感动,好评!']
};
function psName(i){const o=PS[i]&&PS[i].owned;if(!o||!o.length)return '这一站';let b=o[0],bg=-1;for(const k of o)if(STATIONS[k].g>bg){bg=STATIONS[k].g;b=k;}return STATIONS[b].syn?'这一站':STATIONS[b].d;}
function review(cat,name){const good=cat==='good';
  if(good){dGood++;rating=Math.min(5,rating+0.03);}else{reviews++;dBad++;if(dCat[cat]!=null)dCat[cat]++;rating=Math.max(1,rating-0.02);}
  if(simAbs-lastToast<2.4)return;lastToast=simAbs;
  const pool=FB[cat]||FB.crowd;const msg=pool[(Math.random()*pool.length)|0];
  const t=document.getElementById('toast');t.textContent=(good||!name)?msg:('【'+name+'】'+msg);t.classList.toggle('good',good);
  t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2200);}
function stepSim(sdt){
  curWin=Math.min(71,Math.floor(simClock/DAY*72));const wsec=DAY/72;
  for(let k=0;k<STATIONS.length;k++){const lam=LAMBDA[STATIONS[k].n];if(!lam)continue;const rate=lam[curWin];if(rate<=0)continue;
    spawnAcc[k]=(spawnAcc[k]||0)+rate*SCALE/wsec*sdt;while(spawnAcc[k]>=1){spawnAcc[k]-=1;bornAt(k);}}
  for(const kk in latent){latent[kk]-=latent[kk]*LEAVE*sdt;if(latent[kk]<0.25)delete latent[kk];}
  for(const L of lines){if(L.nodes.length<2)continue;for(const tr of L.trains)moveTrain(L,tr,sdt);}
  for(let i=0;i<PS.length;i++){const ql=Q[i];const q=ql?ql.length:0;
    if(q>THRESH)pat[i]=(pat[i]||0)+sdt;else pat[i]=Math.max(0,(pat[i]||0)-sdt*0.7);
    if(pat[i]>=PLIM){review('crowd',psName(i));pat[i]=PLIM*0.4;}
    if(ql&&ql.length&&simAbs-(ql[0].t0||simAbs)>WAIT_LIMIT){ql.shift();lost++;dLost++;gaveUp++;dGaveUp++;if(Math.random()<0.3)review('wait',psName(i));}}
  rating=Math.min(5,rating+0.012*sdt);}

// ---------- 渲染 ----------
function trainLL(L,tr){const m=L.nodes.length;let nj;if(L.loop&&m>2)nj=(tr.i+1)%m;else{nj=tr.i+tr.dir;if(nj<0||nj>=m)nj=tr.i;}
  const A=PS[L.nodes[tr.i]],B=PS[L.nodes[nj]];return {lat:A.lat+(B.lat-A.lat)*tr.t,lng:A.lng+(B.lng-A.lng)*tr.t};}
function draw(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<STATIONS.length;i++){if(STATIONS[i].syn)continue;const p=P(STATIONS[i].lat,STATIONS[i].lng);if(p.x<-15||p.x>W+15||p.y<-15||p.y>H+15)continue;
    ctx.fillStyle='rgba(90,95,110,.30)';ctx.beginPath();ctx.arc(p.x,p.y,2,0,7);ctx.fill();}
  for(const k in latent){const n=latent[k];if(n<0.5)continue;const s=STATIONS[k];const p=P(s.lat,s.lng);
    if(p.x<-15||p.x>W+15||p.y<-15||p.y>H+15)continue;const show=Math.min(Math.round(n),8);
    for(let j=0;j<show;j++){const c=j%4,r=(j/4)|0;ctx.fillStyle='rgba(118,108,92,.55)';ctx.beginPath();ctx.arc(p.x+6+c*5,p.y-6+r*5,1.8,0,7);ctx.fill();}}
  ctx.lineCap='round';ctx.lineJoin='round';
  lines.forEach((L,li)=>{if(L.nodes.length<2)return;
    if(li===active){ctx.strokeStyle=L.col;ctx.globalAlpha=.18;ctx.lineWidth=11;ctx.beginPath();
      for(let k=0;k<L.nodes.length;k++){const p=P(PS[L.nodes[k]].lat,PS[L.nodes[k]].lng);k?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);}
      if(L.loop&&L.nodes.length>2){const p0=P(PS[L.nodes[0]].lat,PS[L.nodes[0]].lng);ctx.lineTo(p0.x,p0.y);}ctx.stroke();ctx.globalAlpha=1;}
    ctx.strokeStyle=L.col;ctx.lineWidth=5;ctx.beginPath();
    for(let k=0;k<L.nodes.length;k++){const p=P(PS[L.nodes[k]].lat,PS[L.nodes[k]].lng);k?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y);}
    if(L.loop&&L.nodes.length>2){const p0=P(PS[L.nodes[0]].lat,PS[L.nodes[0]].lng);ctx.lineTo(p0.x,p0.y);}ctx.stroke();});
  for(let i=0;i<PS.length;i++){if(!alive(i))continue;const p=P(PS[i].lat,PS[i].lng);const big=trCount[i]>1;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,big?6.5:4.6,0,7);ctx.fill();
    ctx.strokeStyle=big?'#2a2c33':'#5b5f6a';ctx.lineWidth=big?2.6:2;ctx.beginPath();ctx.arc(p.x,p.y,big?6.5:4.6,0,7);ctx.stroke();}
  for(let i=0;i<PS.length;i++){if(!alive(i))continue;const q=Q[i]?Q[i].length:0;if(!q)continue;const p=P(PS[i].lat,PS[i].lng);
    const show=Math.min(q,10);for(let k=0;k<show;k++){const c=k%5,r=(k/5)|0;ctx.fillStyle=q>THRESH?'#e0524a':'#566';
      ctx.beginPath();ctx.arc(p.x+10+c*6.5,p.y-9+r*6.5,2.3,0,7);ctx.fill();}
    if(q>10){ctx.fillStyle='#2a2c33';ctx.font='600 10px "IBM Plex Mono"';ctx.fillText('+'+(q-10),p.x+10,p.y+13);}
    if(pat[i]>0){ctx.strokeStyle='#e0524a';ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,10,-1.57,-1.57+6.28*Math.min(1,pat[i]/PLIM));ctx.stroke();}}
  for(const L of lines){if(L.nodes.length<2)continue;for(const tr of L.trains){const ll=trainLL(L,tr),p=P(ll.lat,ll.lng);
    ctx.fillStyle=L.col;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(p.x-9,p.y-6,18,12,4);ctx.fill();ctx.stroke();
    for(let k=0;k<tr.load.length&&k<8;k++){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x-6+k*2,p.y,1,0,7);ctx.fill();}}}
  if(hoverAnchor>=0){const s=STATIONS[hoverAnchor],p=P(s.lat,s.lng);
    ctx.strokeStyle='#3b5bdb';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(p.x,p.y,8,0,7);ctx.stroke();
    const l1=s.d,l2='日均发客 '+s.g.toLocaleString();
    ctx.font='500 13px "Noto Sans SC"';const w1=ctx.measureText(l1).width;ctx.font='500 11px "IBM Plex Mono"';const w2=ctx.measureText(l2).width;
    const bw=Math.max(w1,w2)+22,bh=46;let bx=p.x+13,by=p.y-bh-8;if(bx+bw>W-6)bx=p.x-bw-13;if(by<4)by=p.y+13;
    ctx.fillStyle='#fff';ctx.strokeStyle='#e7e7ec';ctx.lineWidth=1.5;rr(bx,by,bw,bh,11);ctx.fill();ctx.stroke();
    ctx.fillStyle='#2a2c33';ctx.font='500 13px "Noto Sans SC"';ctx.fillText(l1,bx+11,by+19);
    ctx.fillStyle='#3b5bdb';ctx.font='500 11px "IBM Plex Mono"';ctx.fillText(l2,bx+11,by+35);}
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function updHUD(){const mins=Math.floor(simClock/DAY*1440),hh=Math.floor(mins/60),mm=mins%60;
  document.getElementById('clock').textContent=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
  let w=0;for(let i=0;i<PS.length;i++)w+=Q[i]?Q[i].length:0;
  document.getElementById('rate').textContent=rating.toFixed(1);
  document.getElementById('rev').textContent=reviews;document.getElementById('served').textContent=served;
  document.getElementById('wait').textContent=w;
  document.getElementById('cov').textContent=(served+gaveUp)?Math.round(served/(served+gaveUp)*100)+'%':'--';}

function endDay(){running=false;const rb=document.getElementById('bRun');rb.textContent='▶ 运行';rb.classList.remove('on');simClock=DAY;
  const svc=(dServed+dGaveUp)?dServed/(dServed+dGaveUp):1,aw=dWaitN?dWaitSum/dWaitN:0;
  const score=Math.max(0,Math.min(100,Math.round(svc*70+Math.min(1,dServed/600)*15+(rating/5)*15)));
  const gr=score>=90?['S','市长给你打电话了!']:score>=78?['A','通勤族给你立长生牌位。']:score>=66?['B','还行,就是早高峰有点上头。']:score>=52?['C','乘客在写联名信了……']:['D','建议改行,比如去修自行车。'];
  document.getElementById('panel').innerHTML=
    '<div class="pt">📊 第 '+dayNum+' 天 · 运营结算</div>'+
    '<div class="grade"><div class="gl">'+gr[0]+'</div><div class="gs">'+score+'<small>/100</small></div></div>'+
    '<div class="pq">'+gr[1]+'</div>'+
    '<div class="pg"><div>服务率<b>'+((dServed+dGaveUp)?Math.round(svc*100)+'%':'--')+'</b></div><div>送达<b>'+dServed.toLocaleString()+'</b></div><div>挤走<b>'+dGaveUp.toLocaleString()+'</b></div>'+
    '<div>平均候车<b>'+aw.toFixed(1)+'s</b></div><div>好评<b class="g">'+dGood+'</b></div><div>差评<b class="r">'+dBad+'</b></div></div>'+
    '<div class="pc">未覆盖需求 '+dUncovered.toLocaleString()+' · 投诉 挤'+dCat.crowd+'/久'+dCat.wait+'/绕'+dCat.detour+'/换'+dCat.transfer+'/漏'+dCat.miss+'/远'+dCat.far+'</div>'+
    '<div class="pb"><button class="mn on" id="pNext">继续运营 ▶</button><button class="mn" id="pEdit">调整线路</button></div>';
  document.getElementById('pback').style.display='block';document.getElementById('panel').style.display='block';
  document.getElementById('pNext').onclick=()=>newDay(true);
  document.getElementById('pEdit').onclick=()=>newDay(false);
}
function newDay(go){document.getElementById('pback').style.display='none';document.getElementById('panel').style.display='none';
  dServed=dLost=dWaitSum=dWaitN=dGood=dBad=dGaveUp=dUncovered=0;for(const k in dCat)dCat[k]=0;dayNum++;
  Q={};latent={};spawnAcc={};pat={};for(const L of lines)for(const tr of L.trains)tr.load=[];simClock=DAY*0.25;
  if(go){running=true;const rb=document.getElementById('bRun');rb.textContent='❚❚ 暂停';rb.classList.add('on');}}
let lastT=performance.now();
function frame(now){const dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  if(running){const sdt=dt*speed;simAbs+=sdt;stepSim(sdt);simClock+=sdt;if(simClock>=DAY)endDay();}
  draw();updHUD();requestAnimationFrame(frame);}

document.getElementById('bRun').onclick=function(){running=!running;this.textContent=running?'❚❚ 暂停':'▶ 运行';this.classList.toggle('on',running);};
document.getElementById('bBuild').onclick=function(){buildOn=!buildOn;this.classList.toggle('on',buildOn);map.getContainer().style.cursor=buildOn?'crosshair':'';};
document.getElementById('bNew').onclick=()=>{active=-1;buildLineList();};
document.getElementById('bLoop').onclick=()=>{const L=lines[active];if(!L)return;if(!L.loop&&L.nodes.length>=3)L.loop=true;else L.loop=false;recomputeNet();};
document.getElementById('bUndo').onclick=()=>undoLine(active>=0?active:lines.length-1);
document.getElementById('bEnd').onclick=function(){endMode=endMode==='tail'?'head':'tail';this.textContent=endMode==='tail'?'接尾':'接首';this.classList.toggle('on',endMode==='head');};
document.getElementById('bSpeed').onclick=function(){speed=speed>=4?1:speed*2;this.textContent=speed+'×';};
document.getElementById('bReset').onclick=()=>{PS=[];lines=[];active=-1;Q={};spawnAcc={};pat={};latent={};served=lost=gaveUp=reviews=0;rating=5;dServed=dLost=dWaitSum=dWaitN=dGood=dBad=dGaveUp=dUncovered=0;for(const k in dCat)dCat[k]=0;dayNum=1;simClock=DAY*0.25;running=false;const rb=document.getElementById('bRun');rb.textContent='▶ 运行';rb.classList.remove('on');document.getElementById('pback').style.display='none';document.getElementById('panel').style.display='none';recomputeNet();};
document.getElementById('sR').oninput=function(){R=+this.value;document.getElementById('vR').textContent=R+'m';recomputeCatch();};
document.getElementById('bHeat').onclick=function(){this.classList.toggle('on');
  if(heatLayer){map.removeLayer(heatLayer);heatLayer=null;}
  else{const pts=STATIONS.filter(s=>s.g>0).map(s=>[s.lat,s.lng,Math.pow(s.g,0.6)]);
    heatLayer=L.heatLayer(pts,{radius:26,blur:22,max:Math.pow(maxG,0.6)*0.8,minOpacity:.22,
      gradient:{0.2:'#3b5bdb',0.45:'#2f9e6f',0.7:'#e08a1e',1:'#e0524a'}}).addTo(map);}};

map.on('move zoom resize',draw);
map.whenReady(()=>{sizeCanvas();recomputeNet();draw();});
window.addEventListener('resize',()=>{sizeCanvas();draw();});
simClock=DAY*0.25;
requestAnimationFrame(frame);

</script>
</body></html>
